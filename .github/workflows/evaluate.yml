name: Evaluate Agent

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Path to the dataset file"
        required: false
        default: "datasets/example.json"
      agent:
        description: "Path to the agent instruction file"
        required: false
        default: "agents/default_agent.md"

permissions:
  contents: write

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v

  evaluate:
    needs: unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Run evaluation pipeline
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python scripts/run_evaluation.py \
            --dataset "${{ github.event.inputs.dataset || 'datasets/example.json' }}" \
            --agent "${{ github.event.inputs.agent || 'agents/default_agent.md' }}" \
            --output-dir results \
            --experiments-dir experiments

      - name: Commit evaluation results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ experiments/
          if git diff --staged --quiet; then
            echo "No new results to commit."
          else
            git commit -m "chore: add evaluation results from run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
