name: Evaluate Agent

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Path to the dataset file"
        required: false
        default: "datasets/example.json"
      agent:
        description: "Path to the agent instruction file"
        required: false
        default: "agents/default_agent.md"
      model:
        description: "Model to use for evaluation"
        required: false
        default: "gpt-4o-mini"
  push:
    paths:
      - "agents/**"
      - "datasets/**"
      - "scripts/run_evaluation.py"
      - "tests/**"

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GitHub Copilot CLI extension
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: gh extension install github/gh-copilot --force

      - name: Run test suite
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: python -m unittest discover -s tests -v

      - name: Run evaluation pipeline
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python scripts/run_evaluation.py \
            --dataset "${{ github.event.inputs.dataset || 'datasets/example.json' }}" \
            --agent "${{ github.event.inputs.agent || 'agents/default_agent.md' }}" \
            --model "${{ github.event.inputs.model || 'gpt-4o-mini' }}" \
            --output-dir results \
            --experiments-dir experiments

      - name: Commit evaluation results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ experiments/
          if git diff --staged --quiet; then
            echo "No new results to commit."
          else
            git commit -m "chore: add evaluation results from run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
