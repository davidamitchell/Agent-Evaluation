name: Evaluate Agent

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset file to evaluate against"
        required: true
        type: choice
        default: "datasets/example.json"
        options:
          - "datasets/example.json"
          - "datasets/invariance_example.json"
          - "datasets/train/example_train.json"
          - "datasets/test/example_test.json"
          - "datasets/probe/adversarial_probe.json"
      agent:
        description: "Agent instruction file to evaluate"
        required: true
        type: choice
        default: "agents/default_agent.md"
        options:
          - "agents/default_agent.md"
          - "agents/example_agent.md"

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Run evaluation pipeline
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python scripts/run_evaluation.py \
            --dataset "${{ github.event.inputs.dataset }}" \
            --agent "${{ github.event.inputs.agent }}" \
            --output-dir results \
            --experiments-dir experiments

      - name: Commit evaluation results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ experiments/
          if git diff --staged --quiet; then
            echo "No new results to commit."
          else
            git commit -m "chore: add evaluation results from run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
